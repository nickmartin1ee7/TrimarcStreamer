<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: system-ui, -apple-system, sans-serif;
  }
  #statusBar {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 0;
    padding: 10px 16px;
    background: #111;
    border-bottom: 1px solid #222;
    font-size: 13px;
    user-select: none;
    position: relative;
  }
  #statusNodes {
    display: flex;
    align-items: flex-start;
  }
  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: #888;
  }
  .node .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.4s, box-shadow 0.4s;
  }
  .node .dot.green { background: #22c55e; box-shadow: 0 0 7px #22c55e66; }
  .node .dot.red { background: #ef4444; box-shadow: 0 0 7px #ef444466; }
  .node .dot.gray { background: #555; }
  .node .name { color: #aaa; white-space: nowrap; }
  .node .name.highlight { color: #fff; }
  #loader {
    display: flex;
    align-items: center;
    gap: 6px;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
  }
  #loader input {
    width: 140px;
    padding: 4px 8px;
    border: 1px solid #333;
    border-radius: 4px;
    background: #1a1a1a;
    color: #ccc;
    font-size: 12px;
    outline: none;
  }
  #loader input:focus { border-color: #22c55e; }
  #loader button {
    padding: 4px 10px;
    border: none;
    border-radius: 4px;
    background: #22c55e;
    color: #000;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  #loader button:hover { background: #16a34a; }
  .flow {
    width: 44px;
    height: 4px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 3px 2px 0;
  }
  .flow .track {
    width: 100%;
    height: 2px;
    border-radius: 1px;
    background: repeating-linear-gradient(
      90deg,
      #22c55e 0px,
      #22c55e 6px,
      transparent 6px,
      transparent 10px
    );
    background-size: 10px 100%;
    animation: flowAnim 0.5s linear infinite;
    transition: background 0.4s;
  }
  .flow.broken .track {
    background: repeating-linear-gradient(
      90deg,
      #ef4444 0px,
      #ef4444 3px,
      transparent 3px,
      transparent 7px
    );
    background-size: 7px 100%;
    animation: none;
  }
  .flow.broken::after {
    content: '\2716';
    position: absolute;
    color: #ef4444;
    font-size: 10px;
    line-height: 1;
    text-shadow: 0 0 6px #ef444466;
  }
  @keyframes flowAnim {
    0% { background-position: 0 0; }
    100% { background-position: 10px 0; }
  }
  #imageWrap {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }
  img {
    display: block;
    max-width: 100vw;
    max-height: calc(100vh - 37px);
  }
</style>
</head>
<body>
<div id="statusBar">
  <div id="statusNodes">
    <div class="node" id="originNode">
      <span class="dot gray" id="originDot"></span>
      <span class="name" id="originName">Origin</span>
    </div>
    <div class="flow" id="flow1">
      <div class="track"></div>
    </div>
    <div class="node" id="proxyNode">
      <span class="dot gray" id="proxyDot"></span>
      <span class="name" id="proxyName">Proxy</span>
    </div>
    <div class="flow" id="flow2">
      <div class="track"></div>
    </div>
    <div class="node" id="clientNode">
      <span class="dot gray" id="clientDot"></span>
      <span class="name" id="clientName">Client</span>
    </div>
  </div>
  <div id="loader">
    <input type="text" id="idInput" placeholder="CCTV ID" value="{{ID}}" spellcheck="false">
    <button id="loadBtn">Load</button>
  </div>
</div>
{{IMAGE_HTML}}
<script>
const originDot = document.getElementById('originDot');
const proxyDot = document.getElementById('proxyDot');
const clientDot = document.getElementById('clientDot');
const flow1 = document.getElementById('flow1');
const flow2 = document.getElementById('flow2');

let originOk = false;
let proxyOk = true;
let clientState = 'gray';

function setDot(el, state) {
  el.className = 'dot ' + state;
}

function setFlow(el, healthy) {
  el.className = 'flow' + (healthy ? '' : ' broken');
}

function updateLinks() {
  setFlow(flow1, originOk && proxyOk);
  setFlow(flow2, proxyOk && clientState === 'green');
}

function setOrigin(ok) {
  originOk = ok;
  setDot(originDot, ok ? 'green' : 'red');
  updateLinks();
}

function setProxy(ok) {
  proxyOk = ok;
  setDot(proxyDot, ok ? 'green' : 'red');
  updateLinks();
}

function setClient(state) {
  clientState = state;
  setDot(clientDot, state);
  updateLinks();
}

// Initial state
setOrigin(false);
setProxy(true);
setClient('gray');

// Poll health endpoint every 5s
async function pollHealth() {
  try {
    const resp = await fetch('/health');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
{{RECONNECT_JS}}
    setProxy(true);
    setOrigin(!!data.upstream.ok);
  } catch (err) {
    setProxy(false);
    setOrigin(false);
  }
}
setInterval(pollHealth, 5000);
pollHealth();
{{STREAM_JS}}
const idInput = document.getElementById('idInput');
const loadBtn = document.getElementById('loadBtn');

function loadId() {
  const id = idInput.value.trim();
  if (id && /^[a-zA-Z0-9_-]+$/.test(id)) {
    window.location.href = '/' + id;
  }
}

loadBtn.addEventListener('click', loadId);
idInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadId(); });
</script>
</body>
</html>
